<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Worker Active Shift Emerald v1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(25, 51, 38, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(19, 236, 128, 0.1);
        }
        .emerald-gradient {
            background: radial-gradient(circle at top right, #13ec8022, transparent),
                        radial-gradient(circle at bottom left, #102219, #08110d);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative flex min-h-screen w-full flex-col emerald-gradient overflow-hidden">
<!-- Top Header -->
<div class="flex items-center justify-between p-6 pt-12">
<div class="flex items-center gap-3">
<div class="size-12 rounded-full border-2 border-primary/30 p-0.5 overflow-hidden">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="Portrait of a male worker Juan Perez" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAlcSFfs00sHd2DRWQZKJFAIDGkelWLZHScP9d_jyNy2w_xBbwxhP9NFqOnyiUfkPyoMK-Cv3pCaH3ORIWqFznqNgPqKEBnN8i6fOQA0hNW4PGpC3TYbnk0odkWspCz7j-aUHCWYrVMsUcMp1D-_PasXRi1BvhRUoibjbbc4XCJPjUD3Ws5D0gDnmpvzaIzDjV3v7WRic4qk_nuiVdNFNVNWcGGTqcE5xYgtGjMo1svClOi51taPBxk5vSG5ECZhhzcDp4pfJqshfI')"></div>
</div>
<div>
<h1 class="text-xl font-bold tracking-tight text-slate-100">Juan Pérez</h1>
<p class="text-xs font-medium text-primary uppercase tracking-widest">Operador de Planta</p>
</div>
</div>
<button class="relative flex h-10 w-10 items-center justify-center rounded-full bg-slate-800/40 text-slate-100 backdrop-blur-md border border-white/10">
<span class="material-symbols-outlined text-[22px]">notifications</span>
<span class="absolute top-2.5 right-2.5 h-2 w-2 rounded-full bg-primary"></span>
</button>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 py-4 justify-center">
<!-- Shift Status Card -->
<div class="glass-card rounded-3xl p-8 flex flex-col items-center text-center shadow-2xl">
<div class="mb-6 inline-flex items-center gap-2 rounded-full bg-primary/20 px-4 py-1.5 border border-primary/30">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-sm font-bold text-primary tracking-wide">TRABAJANDO</span>
</div>
<div class="mb-8">
<h2 class="text-5xl font-extrabold text-white mb-2">08:42<span class="text-primary/60 text-2xl font-medium">:15</span></h2>
<p class="text-slate-400 text-sm font-medium tracking-normal">Duración del turno actual</p>
</div>
<div class="w-full grid grid-cols-2 gap-4 border-t border-white/5 pt-6">
<div class="text-left">
<p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Inicio</p>
<p class="text-slate-200 font-semibold">08:00 AM</p>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">Ubicación</p>
<p class="text-slate-200 font-semibold">Planta Norte</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-10 space-y-4">
<button class="group flex w-full items-center justify-between rounded-2xl bg-[#fbbf24] p-5 text-slate-900 shadow-lg transition-all active:scale-95">
<div class="flex items-center gap-4">
<div class="flex h-12 w-12 items-center justify-center rounded-xl bg-white/20">
<span class="material-symbols-outlined font-bold text-2xl">pause</span>
</div>
<span class="text-lg font-bold tracking-tight">INICIAR PAUSA</span>
</div>
<span class="material-symbols-outlined opacity-40">chevron_right</span>
</button>
<button class="group flex w-full items-center justify-between rounded-2xl bg-slate-900 border border-red-500/20 p-5 text-slate-100 shadow-lg transition-all active:scale-95">
<div class="flex items-center gap-4">
<div class="flex h-12 w-12 items-center justify-center rounded-xl bg-red-500/20 text-red-500">
<span class="material-symbols-outlined font-bold text-2xl">stop</span>
</div>
<span class="text-lg font-bold tracking-tight">SALIR DEL TURNO</span>
</div>
<span class="material-symbols-outlined opacity-40">logout</span>
</button>
</div>
<!-- Map Hint Component -->
<div class="mt-8 overflow-hidden rounded-2xl border border-white/5 glass-card">
<div class="flex items-center gap-3 p-4">
<span class="material-symbols-outlined text-primary">location_on</span>
<p class="text-sm font-medium text-slate-300">Geolocalización activa</p>
</div>
<div class="h-24 w-full bg-cover bg-center grayscale opacity-40" data-alt="Simplified city map view" data-location="Mexico City" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCROqXF7-lwhooDJr2VKauBLvWnB1RAgp7jrg8PGbucWHEj97DCJEGtfNOf8uLppWIoWfZlwL7gmKkQTYgHAReFispVfCpEj0KHSPKxIxKLvYqimL3FfCnECfpsYRxjg0ucUrpfLwwqqvVvZsbvGpUXwes5o6yRWN1-Zgav4Bnp2PONL-QdBVUjqzW2dyiyM0tSaFzffSFgvMkXH0QpwbEQlNq98mo-1Klx432AE9eTNmyuVXJdBCvAGCywZffiv0uFi1fFv5Ggv5o')"></div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="flex items-center justify-around border-t border-white/5 bg-background-dark/80 px-6 pb-8 pt-4 backdrop-blur-xl">
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Inicio</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-[28px] fill-[1]">timer</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Turno</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">description</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Reportes</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Perfil</span>
</a>
</nav>
</div>
</body></html>
